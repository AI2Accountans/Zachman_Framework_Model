<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="white"/>
  
  <style>
    .header { fill: #6B5B95; stroke: #4a3f66; stroke-width: 1; }
    .label { fill: white; font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; text-anchor: middle; }
    .cell-text { fill: #333; font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
    .border { fill: none; stroke: #ccc; stroke-width: 0.5; }
  </style>

  <g class="header">
    <rect x="130" y="10" width="105" height="40" rx="3"/>
    <rect x="240" y="10" width="105" height="40" rx="3"/>
    <rect x="350" y="10" width="105" height="40" rx="3"/>
    <rect x="460" y="10" width="105" height="40" rx="3"/>
    <rect x="570" y="10" width="105" height="40" rx="3"/>
    <rect x="680" y="10" width="105" height="40" rx="3"/>
    <rect x="10" y="60" width="110" height="60" rx="3"/>
    <rect x="10" y="125" width="110" height="60" rx="3"/>
    <rect x="10" y="190" width="110" height="60" rx="3"/>
    <rect x="10" y="255" width="110" height="60" rx="3"/>
    <rect x="10" y="320" width="110" height="60" rx="3"/>
  </g>

  <g class="label">
    <text x="182" y="35">Why</text><text x="292" y="35">How</text><text x="402" y="35">What</text>
    <text x="512" y="35">Who</text><text x="622" y="35">Where</text><text x="732" y="35">When</text>
    <text x="65" y="95">Contextual</text><text x="65" y="160">Conceptual</text>
    <text x="65" y="225">Logical</text><text x="65" y="290">Physical</text>
    <text x="65" y="355">Detailed</text>
  </g>

  <g class="cell-text">
    <text x="182" y="85">Goal List</text><text x="292" y="85">Process List</text><text x="402" y="85">Material List</text>
    <text x="182" y="150">Goal Rel.</text><text x="292" y="150">Process Model</text><text x="402" y="150">Entity Rel.</text>
    <text x="182" y="215">Rules Diag.</text><text x="292" y="215">Process Diag.</text><text x="402" y="215">Data Model</text>
    <text x="182" y="280">Rules Spec.</text><text x="292" y="280">Function Spec.</text><text x="402" y="280">Data Entity</text>
    <text x="182" y="345">Rules Det.</text><text x="292" y="345">Process Det.</text><text x="402" y="345">Data Det.</text>
    
    <text x="512" y="85">Org. Unit</text><text x="622" y="85">Locations</text><text x="732" y="85">Events</text>
    <text x="512" y="150">Roles</text><text x="622" y="150">Nodes</text><text x="732" y="150">Cycles</text>
  </g>

  <g class="border">
    <rect x="130" y="60" width="655" height="320"/>
    <line x1="235" y1="60" x2="235" y2="380"/><line x1="345" y1="60" x2="345" y2="380"/>
    <line x1="130" y1="120" x2="785" y2="120"/><line x1="130" y1="185" x2="785" y2="185"/>
  </g>
</svg>

